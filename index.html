<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Gestión de Puntos de Red</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: #ffffff; overflow: hidden; }
        
        /* Barra Lateral Izquierda */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background-color: #ffffff;
            border-right: 1px solid hsl(138, 98%, 66%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(29, 29, 29, 0.05);
        }
        h2 { margin: 0; color: #1e293b; font-size: 18px; font-weight: 600; text-align: center; }
        h3 { margin: 0; color: #475569; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .section { display: flex; flex-direction: column; gap: 8px; }
        hr { border: 0; border-top: 1px solid hsl(138, 98%, 66%); margin: 5px 0; }
        
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; }
        button { width: 100%; padding: 11px; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; border: none; }
        
        .btn-buscar { background-color: #2563eb; color: rgb(255, 255, 255); }
        .btn-limpiar { background-color: #ef4444; color: white; margin-top: 5px; }
        .grid-pisos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-piso { background-color: #e2e8f0; color: #475569; font-weight: 600; }
        .btn-piso.activo { background-color: #10b981; color: white; }

        /* Contenedor del Mapa */
        .map-container { 
            flex-grow: 1; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #f1f5f9; 
            touch-action: none; 
            cursor: grab;
            user-select: none; 
            -webkit-user-select: none;
        }
        .map-container:active {
            cursor: grabbing;
        }
        
        .canvas-wrapper { 
            position: absolute; 
            background: white; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-radius: 4px; 
            max-width: none;
            transform-origin: center center;
            will-change: transform; 
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        
        #mapa-imagen { display: block; width: auto; height: auto; border-radius: 4px; pointer-events: none; }
        #map-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        .zoom-info {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: -5px;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: hidden; }
            .sidebar { width: 100%; height: auto; max-height: 35vh; border-right: none; border-bottom: 1px solid hsl(138, 98%, 66%); }
            .map-container { height: 65vh; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Gestión de Red</h2>
        <hr>
        <div class="section">
            <h3>Seleccionar Piso</h3>
            <div class="grid-pisos">
                <button id="btn-p3" class="btn-piso" onclick="cambiarPiso('piso3')">Piso 3</button>
                <button id="btn-p4" class="btn-piso activo" onclick="cambiarPiso('piso4')">Piso 4</button>
            </div>
        </div>
        <hr>
        <div class="section">
            <h3>Localizar Punto de Red</h3>
            <label for="punto-inicial">Origen:</label>
            <input type="text" id="punto-inicial" placeholder="Ej: Torniquetes">
            <label for="punto-preferencia">Destino(s):</label>
            <input type="text" id="punto-preferencia" placeholder="Ej: D512, D85, W.C">
            <button class="btn-buscar" onclick="calcularYMostrarRuta()">Localizar en Mapa</button>
            <button class="btn-limpiar" onclick="limpiarLienzo()">Limpiar Ruta</button>
        </div>
        <hr>
        <div class="zoom-info">
              <b>Arrastrar:</b> Clic sostenido o un dedo.<br>
            🔍 <b>Zoom:</b> Rueda del mouse o 2 dedos.
        </div>
    </div>

    <div class="map-container" id="map-container">
        <div class="canvas-wrapper" id="canvas-wrapper">
            <img id="mapa-imagen" src="imagenes/plano_piso4.jpg" alt="Plano de Red" onload="ajustarLienzo()">
            <canvas id="map-canvas"></canvas>
        </div>
    </div>

        let pisoActual = "piso3"; 

        function cambiarPiso(piso) {
            pisoActual = piso;
            document.getElementById('btn-p3').classList.toggle('activo', piso === 'piso3');
            document.getElementById('btn-p4').classList.toggle('activo', piso === 'piso4');
            const img = document.getElementById('mapa-imagen');
            img.src = baseDatosPlanos[piso].imagen;
            resetInteraccion(); 
            limpiarLienzo();
        }

        function ajustarLienzo() {
            const img = document.getElementById('mapa-imagen');
            const canvas = document.getElementById('map-canvas');
            if (img.clientWidth > 0 && img.clientHeight > 0) {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
            }
        }

        window.addEventListener('resize', ajustarLienzo);

        function limpiarLienzo() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // =================================================================
        // LOGICA DE BUSQUEDA MULTIPLE CORREGIDA Y OPTIMIZADA
        // =================================================================
        function calcularYMostrarRuta() {
            limpiarLienzo(); 
            
            const idInicio = document.getElementById('punto-inicial').value.trim();
            // Capturamos el texto del destino y lo separamos usando expresiones regulares por comas, espacios o guiones
            const textoDestinos = document.getElementById('punto-preferencia').value.trim();
            
            if(!idInicio || !textoDestinos) {
                alert("Por favor, ingresa un punto de origen y al menos un destino.");
                return;
            }

            // Filtrar elementos vacíos por si ponen espacios extras (ej: "D512,  , D511")
            const arrayDestinos = textoDestinos.split(/[\s,;-]+/).filter(id => id.length > 0);

            const puntosDelPiso = baseDatosPlanos[pisoActual].puntos;
            const nodoInicio = puntosDelPiso.find(p => p.id.toLowerCase() === idInicio.toLowerCase());
            
            if (!nodoInicio) {
                alert(`El punto de origen "${idInicio}" no se encuentra registrado en este piso.`);
                return;
            }

            let destinosEncontrados = [];
            let destinosNoEncontrados = [];

            // Evaluamos cada uno de los destinos solicitados
            arrayDestinos.forEach(idDestino => {
                const nodoDestino = puntosDelPiso.find(p => p.id.toLowerCase() === idDestino.toLowerCase());
                if (nodoDestino) {
                    destinosEncontrados.push(nodoDestino);
                } else {
                    destinosNoEncontrados.push(idDestino);
                }
            });

            // Si hay errores de digitación en algunos puntos, le avisamos al usuario pero pintamos los correctos
            if (destinosNoEncontrados.length > 0) {
                alert(`Los siguientes destinos no se encontraron en este piso:\n• ${destinosNoEncontrados.join('\n• ')} \n\nSe graficarán los puntos válidos.`);
            }

            // Dibujamos las rutas en lote
            if (destinosEncontrados.length > 0) {
                dibujarRutasMultiples(nodoInicio, destinosEncontrados);
            }
        }

        function dibujarRutasMultiples(origen, destinos) {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('mapa-imagen');
            
            const escalaX = img.clientWidth / img.naturalWidth;
            const escalaY = img.clientHeight / img.naturalHeight;

            const x1 = origen.x * escalaX;
            const y1 = origen.y * escalaY;

            // 1. Trazar todas las líneas discontinuas primero
            destinos.forEach(destino => {
                const x2 = destino.x * escalaX;
                const y2 = destino.y * escalaY;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = "#2563eb"; 
                ctx.lineWidth = 4;
                ctx.lineCap = "round";
                ctx.setLineDash([8, 6]); 
                ctx.stroke();
            });
            ctx.setLineDash([]); // Reset de discontinuidad

            // 2. Dibujar círculos para los destinos (Rojos)
            destinos.forEach(destino => {
                const x2 = destino.x * escalaX;
                const y2 = destino.y * escalaY;

                ctx.beginPath();
                ctx.arc(x2, y2, 9, 0, 2 * Math.PI);
                ctx.fillStyle = "#ef4444";
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // 3. Dibujar círculo único del Origen por encima de las líneas (Verde)
            ctx.beginPath();
            ctx.arc(x1, y1, 8, 0, 2 * Math.PI);
            ctx.fillStyle = "#10b981";
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // =================================================================
        // INTERACCIÓN: INICIO ALEJADO Y ZERO FLICKER (SIN PARPADEO)
        // =================================================================
        let escalaZoom = 0.25;  
        const zoomMinimo = 0.12; 
        const zoomMaximo = 5;

        let desplazarX = 0;
        let desplazarY = 0;
        let estaArrastrando = false;
        let inicioX = 0;
        let inicioY = 0;

        const wrapper = document.getElementById('canvas-wrapper');
        const contenedorMapa = document.getElementById('map-container');

        window.addEventListener('DOMContentLoaded', () => {
            actualizarTransformacion();
        });

        contenedorMapa.addEventListener('wheel', function(evento) {
            evento.preventDefault();
            if (evento.deltaY < 0) {
                escalaZoom += 0.05;
            } else {
                escalaZoom -= 0.05;
            }
            actualizarTransformacion();
        }, { passive: false });

        let distanciaInicialDedos = 0;

        contenedorMapa.addEventListener('touchstart', function(evento) {
            if (evento.touches.length === 1) {
                estaArrastrando = true;
                inicioX = evento.touches[0].clientX - desplazarX;
                inicioY = evento.touches[0].clientY - desplazarY;
            } else if (evento.touches.length === 2) {
                estaArrastrando = false;
                distanciaInicialDedos = calcularDistanciaTactica(evento.touches[0], evento.touches[1]);
            }
        }, { passive: true });

        contenedorMapa.addEventListener('touchmove', function(evento) {
            if (evento.touches.length === 1 && estaArrastrando) {
                evento.preventDefault();
                desplazarX = evento.touches[0].clientX - inicioX;
                desplazarY = evento.touches[0].clientY - inicioY;
                actualizarTransformacion();
            } else if (evento.touches.length === 2) {
                evento.preventDefault();
                const distanciaActual = calcularDistanciaTactica(evento.touches[0], evento.touches[1]);
                if (distanciaInicialDedos > 0) {
                    const delta = (distanciaActual - distanciaInicialDedos) * 0.004; 
                    escalaZoom += delta;
                    actualizarTransformacion();
                }
                distanciaInicialDedos = distanciaActual;
            }
        }, { passive: false });

        contenedorMapa.addEventListener('touchend', function(evento) {
            if (evento.touches.length === 0) estaArrastrando = false;
            if (evento.touches.length < 2) distanciaInicialDedos = 0;
        });

        contenedorMapa.addEventListener('mousedown', function(evento) {
            estaArrastrando = true;
            inicioX = evento.clientX - desplazarX;
            inicioY = evento.clientY - desplazarY;
        });

        window.addEventListener('mousemove', function(evento) {
            if (!estaArrastrando) return;
            evento.preventDefault();
            desplazarX = evento.clientX - inicioX;
            desplazarY = evento.clientY - inicioY;
            actualizarTransformacion();
        });

        window.addEventListener('mouseup', function() {
            estaArrastrando = false;
        });

        function calcularDistanciaTactica(touch1, touch2) {
            const dx = touch1.clientX - touch2.clientX;
            const dy = touch1.clientY - touch2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function actualizarTransformacion() {
            escalaZoom = Math.max(zoomMinimo, Math.min(zoomMaximo, escalaZoom));
            wrapper.style.transform = `translate3d(${desplazarX}px, ${desplazarY}px, 0px) scale(${escalaZoom})`;
        }

        function resetInteraccion() {
            escalaZoom = 0.25; 
            desplazarX = 0;
            desplazarY = 0;
            actualizarTransformacion();
        }
    </script>
